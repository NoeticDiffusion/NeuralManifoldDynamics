version: 1.2
modality: eeg

# ds004511 dataset overlay config.
# Imports common EEG defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds004511


preprocess:
  datasets:
    ds004511:
      # Dataset-specific raw quirks handled via config (no hardcoded IDs in code).
      patch_invalid_edf_startdate: true
      channel_rename: "truescan_128_numeric_to_10_5"
  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"
  channel_typing:
    enabled: true
    datasets:
      ds004511:
        rules:
          - {regex: "^[0-9]+$", type: "eeg"}
          - {regex: "^EOG", type: "eog"}
          - {regex: "^VEOG", type: "eog"}

metadata_extraction:
  datasets:
    ds004511:
      group:
        default: "Healthy"
      task:
        from_filename: true

feature_storage:
  read_prefer: "csv"   # pyarrow not installed; fall back to CSV

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz"]
      temporal: ["T7", "T8", "TP7", "TP8"]

# Enable EEG regional MNPS over ensemble-derived group trajectories.
regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

# Enable global stratified block Jacobians for EEG validation.
# Uses the NDT M/D/E block partition on the global 9D Jacobian field (coords_9d).
mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1   # all 9 pairs: M→M, M→D, M→E, D→M, D→D, D→E, E→M, E→D, E→E
    csv_output: "stratified_block_jacobians_subjects.csv"
