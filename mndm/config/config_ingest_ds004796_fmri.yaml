version: 1.2
modality: fmri

# ds004796 fMRI overlay config.
# Imports common fMRI defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_fmri.yaml"

datasets:
  - ds004796

preprocess:
  fmri:
    datasets:
      ds004796:
        bandpass: [0.01, 0.1]
        resample_atlas_to_bold: true

features:
  metrics:
    compute_variance: true
    compute_power: true
    compute_fc: true
    compute_kuramoto: true
    compute_modularity: true
    compute_dfc_variance: true
    compute_ar1: true
    compute_slow_band_ratio: true
    compute_gradient_proxy: true
    compute_dvars: true
    dvars_threshold: 3.0

mnps_9d:
  datasets:
    ds004796:
      enabled: true
      subcoords:
        m_a: {fmri_FC_mean: 1.0}
        m_e: {fmri_gradient_ratio: 1.0}
        m_o: {fmri_modularity: 1.0}
        d_n: {fmri_variance_global: 1.0}
        d_l: {fmri_dFC_variance: 1.0}
        d_s: {fmri_kuramoto_global: 1.0}
        e_e: {fmri_signal_power: 1.0}
        e_s: {fmri_slow4_slow5_ratio: 1.0}
        e_m: {fmri_ar1_coefficient: 1.0}

regional_mnps:
  enabled: true
  require_framewise_displacement: false
  min_regions_required: 195
  jacobian:
    enabled: true
    knn: {k: 10, metric: "euclidean"}
    ridge_alpha: 1.0
    distance_weighted: true
    super_window: 2
  stratified:
    enabled: false

metadata_extraction:
  datasets:
    ds004796:
      group:
        default: "Healthy"
      condition:
        from_acq: true
        default: "eyes_closed"
        normalize:
          eyesopen: "eyes_open"
          eyesclosed: "eyes_closed"
          eo: "eyes_open"
          ec: "eyes_closed"
          open: "eyes_open"
          closed: "eyes_closed"
          "eyes-open": "eyes_open"
          "eyes-closed": "eyes_closed"
      task:
        from_filename: true
        default: "rest"
        normalize:
          rest: "rest"
          msit: "msit"
          sternberg: "sternberg"
        compound_conditions: ["eyesclosed", "eyesopen", "ec", "eo"]
