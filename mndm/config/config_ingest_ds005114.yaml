version: 1.2
modality: eeg

# ds005114 dataset overlay config.
# Imports common EEG defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds005114


preprocess:
  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"
  artifacts:
    method: "none"
    ica_n_components: 20
    ica_method: "fastica"
    datasets:
      ds005114:
        method: "eog_reg"

event_crop:
  enabled: false
  onset_column: "onset"
  duration_column: "duration"
  match_column: "trial_type"
  include_regex: null
  exclude_regex: null
  start_offset: 0.0
  stop_offset: 0.0
  min_duration: 60.0
  suffix_candidates: ["_events.tsv"]
  datasets:
    ds005114:
      enabled: true
      exclude_regex: "(?i)(Practice|boundary|STATUS)"
      match_column: "trial_type"
      start_offset: -5.0
      stop_offset: 10.0
      min_duration: 120.0

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz"]
      temporal: ["T7", "T8", "TP7", "TP8"]

regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1
    csv_output: "stratified_block_jacobians_subjects.csv"

metadata_extraction:
  datasets:
    ds005114:
      group:
        candidates: ["Group", "Diagnosis"]
