version: 1.2
modality: eeg

# ds005555 dataset overlay config.
# Imports common EEG defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds005555

source:
  name: "OpenNeuro"
  platform: "OpenNeuro"
  format: "BIDS"
  dataset_id: "ds005555"
  dataset_name: "The Bitbrain Open Access Sleep (BOAS) dataset"
  dataset_version: "1.1.1"
  doi: "10.18112/openneuro.ds005555.v1.1.1"
  url: "https://openneuro.org/datasets/ds005555"


preprocess:
  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"
  crop:
    start_sec: 10
    stop_sec: 360
    datasets:
      ds005555:
        start_sec: 0
        stop_sec: null

epoching:
  datasets:
    ds005555:
      length_s: 30.0
      step_s: 30.0
      sampling:
        enabled: true
        method: "stage_stratified_blocks"
        stage_columns: ["stage_hum", "stage_ai", "stage"]
        onset_column: "onset"
        duration_column: "duration"
        target_minutes:
          Wake: 20
          N2: 20
          N3: 20
          REM: 20
        block_minutes: 5
        seed: 42

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz"]
      temporal: ["T7", "T8", "TP7", "TP8"]

regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1
    csv_output: "stratified_block_jacobians_subjects.csv"

ndt_ingest:
  ingest_version: "1.2"
  modalities:
    eeg:
      enabled: true
      datasets:
        ds005555:
          synchrony: {enabled: false}
          complexity: {enabled: false}
          dynamic_fc: {enabled: false}
          graph_metrics: {enabled: false}

metadata_extraction:
  datasets:
    ds005555:
      group:
        default: "Healthy"
      task:
        from_filename: true
        normalize:
          Sleep: "sleep"
