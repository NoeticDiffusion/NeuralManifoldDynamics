version: 1.2
modality: eeg

# ds005505 dataset overlay config.
# Imports common EEG defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds005505

source:
  name: "OpenNeuro"
  platform: "OpenNeuro"
  format: "BIDS"
  dataset_id: "ds005505"
  url: "https://openneuro.org/datasets/ds005505"

preprocess:
  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz"]
      temporal: ["T7", "T8", "TP7", "TP8"]

regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1
    csv_output: "stratified_block_jacobians_subjects.csv"

ndt_ingest:
  ingest_version: "1.2"
  modalities:
    eeg:
      enabled: true
      datasets:
        ds005505:
          synchrony: {enabled: false}
          complexity: {enabled: false}
          dynamic_fc: {enabled: false}
          graph_metrics: {enabled: false}

metadata_extraction:
  datasets:
    ds005505:
      group:
        default: "HBN"
      condition:
        from_acq: true
        default: "unspecified"
        normalize:
          eyesopen: "eyes_open"
          eyesclosed: "eyes_closed"
          eo: "eyes_open"
          ec: "eyes_closed"
          open: "eyes_open"
          closed: "eyes_closed"
          "eyes-open": "eyes_open"
          "eyes-closed": "eyes_closed"
      task:
        from_filename: true
        normalize:
          rest: "rest"
          resting: "rest"
          restingstate: "rest"
          surroundsuppression: "surround_suppression"
          surroundsupp: "surround_suppression"
          movies: "movie"
          movie: "movie"
          contrastchangedetection: "contrast_change"
          contrastchange: "contrast_change"
          sequencelearning: "sequence_learning"
          sequence: "sequence_learning"
          symbolsearch: "symbol_search"
          symbols: "symbol_search"
