version: 1.2
modality: eeg

# ds004796 EEG overlay config.
# Imports common EEG defaults, then applies only dataset-specific overrides.
imports:
  - "./config_ingest_common_eeg.yaml"

datasets:
  - ds004796

preprocess:
  eeg_csd:
    enabled: true
    lambda2: 1.0e-5
    stiffness: 4.0
    n_legendre_terms: 50
    min_eeg_channels: 16
    on_error: "warn"

robustness:
  ensembles:
    enabled: true
    min_channels: 3
    groups:
      frontal: ["Fp1", "Fp2", "F3", "F4", "Fz", "F7", "F8"]
      central: ["FC1", "FC2", "C3", "Cz", "C4"]
      parietal_occipital: ["P3", "P4", "Pz", "O1", "O2", "PO3", "PO4", "Oz"]
      temporal: ["T7", "T8", "TP7", "TP8"]

regional_mnps:
  enabled: true
  stratified:
    enabled: true
  block_jacobians:
    enabled: true

mnps_9d:
  block_jacobians:
    enabled: true
    preset: mde_families_v1
    csv_output: "stratified_block_jacobians_subjects.csv"

metadata_extraction:
  datasets:
    ds004796:
      group:
        default: "Healthy"
      condition:
        from_acq: true
        default: "eyes_closed"
        normalize:
          eyesopen: "eyes_open"
          eyesclosed: "eyes_closed"
          eo: "eyes_open"
          ec: "eyes_closed"
          open: "eyes_open"
          closed: "eyes_closed"
          "eyes-open": "eyes_open"
          "eyes-closed": "eyes_closed"
      task:
        from_filename: true
        default: "rest"
        normalize:
          rest: "rest"
          msit: "msit"
          sternberg: "sternberg"
        compound_conditions: ["eyesclosed", "eyesopen", "ec", "eo"]
